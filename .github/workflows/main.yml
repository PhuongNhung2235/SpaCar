name: Deploy SpaCar Website
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        # Vì GitHub Actions chạy từ thư mục gốc của Repo (tức là Source Code)
        # nên ta chỉ cần chui vào spacar-project
        working-directory: "./spacar-project"
        run: |
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./spacar-project/dist"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
