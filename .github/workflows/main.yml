name: Deploy SpaCar Website

on:
  push:
    branches: ["main"] # Tự động chạy mỗi khi bạn push code lên nhánh main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Nếu bạn dùng Vite thì là ./dist, nếu dùng Create React App thì sửa thành ./build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
