name: Deploy SpaCar Website

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Đã bỏ dòng cache để tránh lỗi không tìm thấy lock file

      - name: Install and Build
        run: |
          cd "Source Code" # Chú ý: Cần có dấu ngoặc kép vì tên thư mục có khoảng trắng
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Kiểm tra: Nếu dùng Vite thì để dist, nếu dùng React cũ thì sửa thành build
          path: ./Source Code/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
